  build-macos:
    needs: [prepare]
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      platform: macos
      channel: nightly
      vault-role: trusttunnel-app
      version: ${{ needs.prepare.outputs.version }}
      build-number: ${{ github.run_number }}
      version-title: ${{ needs.prepare.outputs.version-title }}
      macos-signing-type: development
      artifact-name: trusttunnel-macos-pr
      artifact-path: macos/build/TrustTunnel.app.zip