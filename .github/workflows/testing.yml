name: Testing

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: [team-flutter]
    outputs:
      version: ${{ steps.meta.outputs.version }}
      version-title: ${{ steps.meta.outputs.version-title }}
    steps:
      - uses: AdGuardSoftwareLimited/actions/actions/epoch-version-metadata@master
        id: meta

