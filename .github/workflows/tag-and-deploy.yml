name: Tag and deploy
run-name: 'Tag ${{ inputs.tag }}'

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Semver version tag to create, for example v1.3.0-beta.1 or v1.3.0'
        required: true
        type: string
      slack-channel:
        description: 'Slack channel for build notification'
        type: string
        default: '#build-trusttunnel'
      ref:
        description: 'Git ref SHA or branch to tag. If empty, tags the commit from the branch selected in UI.'
        type: string
        default: ''

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  tag:
    uses: AdGuardSoftwareLimited/actions/.github/workflows/validate-and-tag.yml@master
    with:
      team: flutter
      tag: ${{ inputs.tag }}
      ref: ${{ inputs.ref }}

  deploy:
    needs: tag
    uses: ./.github/workflows/deploy-apps.yml
    secrets: inherit
    with:
      tag: ${{ inputs.tag }}
      slack-channel: ${{ inputs.slack-channel }}