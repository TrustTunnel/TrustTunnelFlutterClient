name: downloads_directory_provider
description: Provides the public Downloads directory path on Android via native MethodChannel.
publish_to: none
version: 0.0.1

resolution: workspace

environment:
  sdk: ^3.10.0
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  path_provider: 2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.adguard.downloads_directory_provider
        pluginClass: DownloadsDirectoryProviderPlugin
