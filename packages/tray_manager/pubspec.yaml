name: tray_manager
version: 0.1.0
publish_to: 'none'

resolution: workspace

description: "TrustTunnel macOS status bar tray API and menu models."

environment:
  sdk: 3.10.1
  flutter: 3.38.3

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: 6.0.0

flutter:
  plugin:
    platforms:
      macos:
        pluginClass: TrayManagerMacosPlugin
